services:
  # ============================================
  # Backend - FastAPI
  # ============================================
  - type: web
    name: rag-drawio-backend
    runtime: python
    region: ohio
    plan: free
    buildCommand: pip install --no-cache-dir -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: QDRANT_HOST
        value: zzzzzz-0000-0000-0000-000000.us-east-1-0.aws.cloud.qdrant.io
      - key: QDRANT_PORT
        value: 6333
      - key: QDRANT_COLLECTION
        value: drawio_flows
      - key: QDRANT_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: HOST
        value: 0.0.0.0

  # ============================================
  # Frontend - React Static Site
  # ============================================
  - type: static
    name: rag-drawio-frontend
    region: ohio
    buildCommand: cd frontend && npm install && npx vite build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://rag-drawio-backend.onrender.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
